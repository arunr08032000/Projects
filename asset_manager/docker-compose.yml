version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: asset_db
    restart: always
    environment:
      MYSQL_DATABASE: asset_db
      MYSQL_USER: asset_user
      MYSQL_PASSWORD: asset_pass
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  django:
    build:
      context: .
      dockerfile: django_app/Dockerfile
    container_name: asset_django
    restart: always
    command: >
      sh -c "python manage.py makemigrations assets &&
             python manage.py migrate &&
             DJANGO_SUPERUSER_PASSWORD=admin python manage.py createsuperuser --noinput --username admin --email admin@example.com || true &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./django_app:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=asset_db
      - DB_USER=asset_user
      - DB_PASSWORD=asset_pass
      - DB_HOST=db
      - DB_PORT=3306
    depends_on:
      - db

  fastapi:
    build:
      context: .
      dockerfile: fastapi_app/Dockerfile
    container_name: asset_fastapi
    restart: always
    command: uvicorn fastapi_app.main:app --host 0.0.0.0 --port 8001
    volumes:
      - .:/app
    ports:
      - "8001:8001"
    environment:
      - DB_NAME=asset_db
      - DB_USER=asset_user
      - DB_PASSWORD=asset_pass
      - DB_HOST=db
      - DB_PORT=3306
    depends_on:
      - db

  flask:
    build:
      context: .
      dockerfile: flask_app/Dockerfile
    container_name: asset_flask
    restart: always
    command: python flask_app/app.py
    volumes:
      - ./flask_app:/app
    ports:
      - "8002:8002"
    environment:
      - API_URL=http://fastapi:8001/api
    depends_on:
      - fastapi

volumes:
  mysql_data:
